<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cronograma</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
body{background:#282828;}
*{box-sizing:border-box;margin:0;padding:0}
.sch{
    max-width:680px;
    padding:.5rem 0 2rem;
    font-family:var(--font-sans)
}
.top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:1rem
}
.sch-ttl{
    font-size:30px;
    font-weight:500;
    color:white;
}
.sch-ttl.done{
    color:greenyellow;
    text-shadow:0 0 8px greenyellow;
}
.si{
    opacity:0;
    font-size:12px;
    color:white;
    transition:color .3s
}
.si.ok{
    opacity:1;
    color:greenyellow
}
.dl-btn{
    display:inline-flex;
    align-items:center;
    color:white;
    gap:10px;
    font-size:12px;
    padding:10px 10px;
    border-radius:var(--radius);
    border:.5px solid var(--border-strong);
    background:none;
    cursor:pointer;
    font-family:var(--font-sans)
}
.dl-btn:hover{background:var(--surface-1)}
.day-sec{
    border:.10px solid var(--border);
    border-radius:12px;
    margin-bottom:5px;
    overflow:hidden;
    background:#282828
}
.day-sec.today{border-color:var(--border-accent)}
.day-hdr{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:9px 14px;
    cursor:pointer;
    user-select:none
}
.day-hdr:hover{background:var(--surface-2)}
.dnr{
    display:flex;
    align-items:center;
    gap:7px
}
.dnm{
    font-size:18px;
    font-weight:500;
    color:white;
    text-transform:uppercase;
    letter-spacing:.5px
}
.dnm.done{
    color:greenyellow;
    text-decoration-thickness: 2px;
}
.tb{
    font-size:20px;
    padding:2px 6px;
    border-radius:var(--radius);
    color:gray;
    background:var(--bg-accent);
    font-weight:500
}
.dbody{
    border-top:.10px solid var(--border);
    padding:6px 10px 8px;
    background:#282828;
}
.blk{
    padding:8px 10px;
    border-left:6px solid transparent;
    margin-bottom:3px;
    background:#2e2e2e
}
.blk:hover{background:#282828}
.blk.estudo{border-left-color:gray}
.blk.livre{border-left-color:gold}
.blk.pessoal{border-left-color:rgb(230, 230, 230)}
.blkr{
    display:flex;
    align-items:center;
    gap:20px
}
[contenteditable]{outline:none}
.btime{
    font-size:13px;
    color:white;
    font-family:var(--font-mono);
    white-space:nowrap;
    min-width:108px;
    cursor:text;
    padding:1px 3px;
    border-radius:2px
}
.btime:focus{
    background:var(--surface-1);
    color:white
}
.btit{
    font-size:20px;
    font-weight:500;
    color:white;
    flex:1;
    cursor:text;
    padding:1px 6px;
    border-radius:3px
}
.btit:focus{background:var(--surface-1)}
.cat{
    font-size:12px;
    padding:2px 6px;
    border-radius:var(--radius);
    cursor:pointer;
    font-weight:500;
    white-space:nowrap
}
.cat.estudo{background:var(--bg-accent);color:white}
.cat.livre{background:var(--bg-success);color:white}
.cat.pessoal{background:var(--bg-warning);color:white}
.bdel{
    opacity:1;
    background:none;
    border:none;
    cursor:pointer;
    color:rgb(97, 97, 97);
    padding:2px 5px;
    border-radius:3px;
    font-size:15px;
    line-height:1
}
.blk:hover .bdel{opacity:1}
.bdel:hover{background:var(--bg-danger);color:red}
.bnote{
    font-size:15px;
    color:#c0c0c0;
    margin-top:4px;
    padding:1px 3px 1px calc(158px + 16px);
    cursor:text;
    min-height:1.2em;
    line-height:1.4;
    border-radius:3px
}
.bnote:focus{background:var(--surface-1);color:#c0c0c0}
.bnote:empty::before{
    content:'...';
    color:var(--text-disabled);
    pointer-events:none
}
.addbtn{
    display:flex;
    align-items:center;
    gap:0px;
    color:#c0c0c0;
    font-size:20px;
    padding:0px 0px;
    cursor:pointer;
    border-radius:var(--radius);
    width:100%;
    background:none;
    border:none;
    text-align:left;
    font-family:var(--font-sans);
    margin-top:0px
}
.addbtn:hover{background:var(--surface-2);color:greenyellow}
.check{
    width:20px;
    height:20px;
    border:2px solid white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:40px;
    font-weight:bold;
    color:transparent;
    transition:.2s;
    flex-shrink:0;
}
.check.done{
    background:#282828;
    border-color:white;
    color:greenyellow;
}
.check:hover{
    transform:scale(1.1);
}
</style>
</head>
<body>

<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Cronograma semanal</h2>

<div class="sch">
<div class="top">
  <span class="sch-ttl">タイムライン</span>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="si" id="si">salvo</span>
    <button class="dl-btn" id="dlbtn"></button>
  </div>
</div>
<div id="grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

/* ── Supabase ── */
const ROW_ID = "d736da8d-0126-4bf0-a5fb-e63abedd3377";
let db;

if (!window.supabase) {
    console.error("Supabase não carregou.");
} else {
    db = window.supabase.createClient(
        "https://kfpizokoxwiwdpjwdhac.supabase.co",
        "sb_publishable_-wiUEfcE1bUApqljX_1JtA_v2UIFywD"
    );
}

/* ── Constantes globais ── */
const DAYS_JS = [6, 0, 1, 2, 3, 4, 5];
const TODAY   = DAYS_JS[new Date().getDay()];
const CATS    = ['estudo', 'livre', 'pessoal'];
const NAMES   = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

const DEF = [
  {n:'Monday',    b:[['13h – 16h','Cálculo I','estudo','',false],['16:40h – 20:30h','Programação','estudo','',false]]},
  {n:'Tuesday',   b:[['13h – 16h','Cálculo I','estudo','',false],['16:40h – 20:30h','Programação','estudo','',false]]},
  {n:'Wednesday', b:[['13h – 16h','Cálculo I','estudo','',false],['16:40h – 20:30h','Física ou Biologia','estudo','',false]]},
  {n:'Thursday',  b:[['13h – 16h','Cálculo I','estudo','',false],['16:40h – 20:30h','Matemática EM ou Química','estudo','',false]]},
  {n:'Friday',    b:[['13h – 16h','Cálculo I','estudo','',false],['16:40h – 20:30h','Programação','estudo','',false]]},
  {n:'Saturday',  b:[['13h – 16h','Cálculo I','estudo','',false],['16:40h – 20:30h','Física ou Química','estudo','',false]]},
  {n:'Sunday',    b:[['15h – 20h','Livre — basquete','livre','',false]]}
];

let S;

/* ── Load (Supabase → fallback local) ── */
async function load() {
    const { data, error } = await db
        .from("cronograma")
        .select("dados")
        .eq("id", ROW_ID)
        .single();

    if (error || !data || !data.dados) {
        console.warn("Sem dados no Supabase, usando padrão.", error);
        S = fresh();
    } else {
        S = data.dados;
    }

    /* Garante que os nomes dos dias estão sempre certos */
    S.forEach((day, i) => { day.n = NAMES[i]; });
}

function fresh() {
    return DEF.map((d, i) => ({
        n: d.n,
        o: i === TODAY,
        b: d.b.map(b => [...b])
    }));
}

/* ── Save (Supabase + localStorage de backup) ── */
let tm;

async function save() {
    const { error } = await db
        .from("cronograma")
        .upsert({ id: ROW_ID, dados: S });

    if (error) {
        console.error("Erro ao salvar:", error);
    } else {
        localStorage.setItem("cron_v1", JSON.stringify(S));
        showOK();
    }
}

function dsave() {
    clearTimeout(tm);
    tm = setTimeout(async () => { await save(); }, 700);
}

function showOK() {
    const el = document.getElementById('si');
    el.textContent = 'salvo';
    el.classList.add('ok');
    clearTimeout(el._t);
    el._t = setTimeout(() => {
        el.textContent = '';
        el.classList.remove('ok');
    }, 1500);
}

/* ── Render ── */
function render() {
    const g = document.getElementById('grid');
    g.innerHTML = '';

    const allDone = S.every(day => day.b.length > 0 && day.b.every(blk => blk[4] === true));
    document.querySelector('.sch-ttl').classList.toggle('done', allDone);

    S.forEach((day, di) => {
        const sec = document.createElement('div');
        sec.className = 'day-sec' + (di === TODAY ? ' today' : '');

        const hdr = document.createElement('div');
        hdr.className = 'day-hdr';
        hdr.setAttribute('role', 'button');
        hdr.setAttribute('aria-expanded', day.o ? 'true' : 'false');

        const dnr = document.createElement('div');
        dnr.className = 'dnr';

        const nm = document.createElement('span');
        nm.className = 'dnm';
        nm.textContent = day.n;

        const completed = day.b.length > 0 && day.b.every(blk => blk[4] === true);
        if (completed) nm.classList.add('done');

        dnr.appendChild(nm);

        if (di === TODAY) {
            const b = document.createElement('span');
            b.className = 'tb';
            b.textContent = '<<';
            dnr.appendChild(b);
        }

        const cv = document.createElement('i');
        cv.className = 'ti ti-chevron-' + (day.o ? 'up' : 'down');
        cv.setAttribute('aria-hidden', 'true');
        cv.style.cssText = 'font-size:14px;color:var(--text-muted)';

        hdr.appendChild(dnr);
        hdr.appendChild(cv);
        hdr.onclick = () => { S[di].o = !S[di].o; save(); render(); };
        sec.appendChild(hdr);

        if (!day.o) { g.appendChild(sec); return; }

        const body = document.createElement('div');
        body.className = 'dbody';

        day.b.forEach((blk, bi) => {
            const el = document.createElement('div');
            el.className = 'blk ' + blk[2];

            const row = document.createElement('div');
            row.className = 'blkr';

            const ck = document.createElement('span');
            ck.className = 'check' + (blk[4] ? ' done' : '');
            ck.textContent = '✓';
            ck.onclick = e => {
                e.stopPropagation();
                S[di].b[bi][4] = !S[di].b[bi][4];
                save(); render();
            };

            const t = document.createElement('span');
            t.className = 'btime';
            t.contentEditable = true;
            t.textContent = blk[0];
            t.oninput = () => { S[di].b[bi][0] = t.textContent; dsave(); };
            t.onclick = e => e.stopPropagation();
            t.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); t.blur(); } };

            const ti = document.createElement('span');
            ti.className = 'btit';
            ti.contentEditable = true;
            ti.textContent = blk[1];
            ti.oninput = () => { S[di].b[bi][1] = ti.textContent; dsave(); };
            ti.onclick = e => e.stopPropagation();
            ti.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); ti.blur(); } };

            const tg = document.createElement('span');
            tg.className = 'cat ' + blk[2];
            tg.textContent = blk[2];
            tg.title = 'Clique para trocar categoria';
            tg.onclick = e => {
                e.stopPropagation();
                const idx = CATS.indexOf(S[di].b[bi][2]);
                S[di].b[bi][2] = CATS[(idx + 1) % CATS.length];
                save(); render();
            };

            const d = document.createElement('button');
            d.className = 'bdel';
            d.textContent = 'X';
            d.setAttribute('aria-label', 'Remover bloco');
            d.onclick = e => {
                e.stopPropagation();
                if (!confirm("Deseja apagar esta atividade?")) return;
                S[di].b.splice(bi, 1);
                save(); render();
            };

            row.appendChild(ck);
            row.appendChild(t);
            row.appendChild(ti);
            row.appendChild(tg);
            row.appendChild(d);
            el.appendChild(row);

            const n = document.createElement('div');
            n.className = 'bnote';
            n.contentEditable = true;
            n.textContent = blk[3];
            n.oninput = () => { S[di].b[bi][3] = n.textContent; dsave(); };
            n.onclick = e => e.stopPropagation();
            el.appendChild(n);

            body.appendChild(el);
        });

        const ab = document.createElement('button');
        ab.className = 'addbtn';
        ab.innerHTML = '<i class="ti ti-plus" aria-hidden="true" style="font-size:14px"></i>.';
        ab.onclick = () => {
            S[di].b.push(['', 'Nova atividade', 'estudo', '', false]);
            save(); render();
            setTimeout(() => {
                const es = body.querySelectorAll('.blk');
                if (es.length) es[es.length - 1].querySelector('.btit').focus();
            }, 30);
        };

        body.appendChild(ab);
        sec.appendChild(body);
        g.appendChild(sec);
    });
}

/* ── Inicialização ── */
(async () => {
    await load();
    render();
})();

</script>
</body>
</html>
